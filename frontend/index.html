<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimCo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #000000;
      font-family: 'Times New Roman', Times, serif;
      color: #ffffff;
    }
    
    #game-container {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000000;
    }

    #character-ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background-color: #000000;
      color: #ffffff;
      font-family: 'Times New Roman', Times, serif;
      font-size: 13px;
      line-height: 1.6;
    }

    .ui-section {
      margin-bottom: 20px;
    }

    .ui-section-title {
      color: #ffffff;
      font-weight: bold;
      margin-bottom: 8px;
      text-decoration: underline;
    }

    .ui-row {
      margin-bottom: 6px;
      color: #cccccc;
    }

    button {
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 6px 12px;
      margin: 4px 4px 4px 0;
      cursor: pointer;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
      font-weight: bold;
    }

    button:hover {
      background-color: #e0e0e0;
    }

    #leaderboard-display {
      padding: 10px 0;
      border-top: 1px solid #666666;
      margin-top: 12px;
    }

    .leaderboard-entry {
      margin: 3px 0;
      color: #cccccc;
    }

    .leaderboard-entry.selected {
      color: #ffffff;
      font-weight: bold;
    }

    #player-discussion-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1200;
      width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      background: #000000;
      color: #ffffff;
      border: 1px solid #666666;
      padding: 14px;
      display: none;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
    }

    #player-discussion-panel.open { display: block; }

    .talk-matrix {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-top: 6px;
    }

    .matrix-corner {
      min-width: 82px;
      width: 82px;
    }

    .matrix-col-header {
      text-align: center;
      padding: 2px 2px 6px;
      color: #ffffff;
      font-size: 11px;
      font-weight: bold;
      min-width: 28px;
      width: 28px;
    }

    .matrix-col-header.inactive { color: #444444; }

    .matrix-row-header {
      padding: 2px 8px 2px 0;
      font-weight: normal;
      white-space: nowrap;
      vertical-align: middle;
    }

    .matrix-row-inner {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .matrix-row-header.inactive .matrix-row-inner { opacity: 0.3; }

    .matrix-avatar {
      display: block;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      flex-shrink: 0;
      overflow: hidden;
    }

    .matrix-cell {
      text-align: center;
      padding: 3px 2px;
      border: 1px solid #1a1a1a;
      min-width: 28px;
      width: 28px;
      font-size: 14px;
      vertical-align: middle;
    }

    .matrix-cell.talked   { background: #123315; color: #58d66f; font-weight: bold; }
    .matrix-cell.planned  { background: #132d4f; color: #6db8ff; font-weight: bold; }
    .matrix-cell.not-talked { background: #3a3a3a; color: #b8b8b8; }
    .matrix-cell.self     { background: #222222; color: #555555; font-size: 10px; }
    .matrix-cell.unavailable { background: #1a1a1a; }

    .discussion-section-title {
      margin: 10px 0 6px;
      font-weight: bold;
      color: #d9d9d9;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-size: 11px;
    }

    .discussion-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin: 6px 0;
    }

    .discussion-controls label {
      color: #bdbdbd;
      font-size: 11px;
    }

    .discussion-controls select,
    .discussion-controls button {
      font-size: 11px;
      padding: 4px 6px;
    }

    .discussion-legend {
      margin: 6px 0 8px;
      color: #b6b6b6;
      font-size: 11px;
    }

    #player-info-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1200;
      width: 260px;
      max-height: 70vh;
      overflow-y: auto;
      background: #000000;
      color: #ffffff;
      border: 1px solid #666666;
      padding: 10px;
      display: none;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
    }

    #player-info-panel.open {
      display: block;
    }

    .player-info-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      border-bottom: 1px solid #444444;
      padding-bottom: 6px;
    }

    .player-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #222222;
      color: #cccccc;
    }

    .player-info-row.selected {
      color: #ffffff;
      font-weight: bold;
    }

    .player-info-avatar {
      flex-shrink: 0;
      width: 32px;
      height: 64px;
      display: inline-block;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      background-color: transparent;
    }

    #chat-log-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1200;
      width: 320px;
      max-height: 340px;
      overflow-y: auto;
      background: #000000;
      color: #ffffff;
      border: 1px solid #666666;
      padding: 10px 12px;
      display: none;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
    }

    #chat-log-panel.open { display: block; }

    .chat-log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      border-bottom: 1px solid #444444;
      padding-bottom: 6px;
    }

    .chat-entry {
      padding: 3px 0;
      border-bottom: 1px solid #1c1c1c;
      color: #cccccc;
    }

    .chat-entry .chat-time   { color: #666666; margin-right: 4px; }
    .chat-entry .chat-player { color: #ffffff; font-weight: bold; margin-right: 4px; }
    .chat-entry .chat-msg    { color: #aaaaaa; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  
  <!-- Minimal Control Panel -->
  <div id="character-ui">
    <div class="ui-section">
      <button id="add-character-btn">Add Character</button>
      <button id="game-state-btn">Game: Off</button>
      <button id="see-player-info-btn">See Player Information</button>
      <button id="see-player-discussion-btn">Player Discussion</button>
      <button id="see-chat-log-btn">Chat Log</button>
    </div>

    <div class="ui-section">
      <div class="ui-section-title">Status</div>
      <div class="ui-row" id="selected-character-display">Selected: None</div>
      <div class="ui-row" id="character-count">Characters: 0/10</div>
    </div>

    <div class="ui-section">
      <div class="ui-section-title">Prize Pool</div>
      <div class="ui-row" id="prize-pool-display">$1000.00</div>
    </div>

    <div id="leaderboard-display">
      <div class="ui-section-title">Leaderboard</div>
    </div>
  </div>

  <div id="player-info-panel" aria-hidden="true">
    <div class="player-info-header">
      <div class="ui-section-title" style="margin-bottom:0; text-decoration:none;">Player Information</div>
      <button id="close-player-info-btn">Close</button>
    </div>
    <div id="player-info-list"></div>
  </div>

  <!-- Chat Log Panel -->
  <div id="chat-log-panel" aria-hidden="true">
    <div class="chat-log-header">
      <div class="ui-section-title" style="margin-bottom:0; text-decoration:none;">Chat Log</div>
      <button id="close-chat-log-btn">Close</button>
    </div>
    <div id="chat-log-list"><em style="color:#555">No messages yet.</em></div>
  </div>

  <!-- Player Discussion: talk matrix -->
  <div id="player-discussion-panel" aria-hidden="true">
    <div class="player-info-header">
      <div class="ui-section-title" style="margin-bottom:0; text-decoration:none;">Player Discussion</div>
      <button id="close-player-discussion-btn">Close</button>
    </div>
    <div id="player-discussion-list"></div>
  </div>
  
  <!-- Include Phaser library -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
  
  <!-- Include scene scripts -->
  <script src="phaser/scenes/MapScene.js"></script>
  <script src="phaser/scenes/AgentScene.js"></script>
  
  <!-- Include the game script -->
  <script src="game.js"></script>

  <script>
    // Chat Log panel toggle
    const chatLogPanel = document.getElementById('chat-log-panel');
    document.getElementById('see-chat-log-btn').addEventListener('click', () => {
      chatLogPanel.classList.toggle('open');
      chatLogPanel.setAttribute('aria-hidden', chatLogPanel.classList.contains('open') ? 'false' : 'true');
    });
    document.getElementById('close-chat-log-btn').addEventListener('click', () => {
      chatLogPanel.classList.remove('open');
      chatLogPanel.setAttribute('aria-hidden', 'true');
    });

    // Poll backend every 2 s and refresh the chat log list
    function refreshChatLog() {
      fetch('http://127.0.0.1:5000/api/greets')
        .then(r => r.json())
        .then(entries => {
          const list = document.getElementById('chat-log-list');
          if (!entries.length) {
            list.innerHTML = '<em style="color:#555">No messages yet.</em>';
            return;
          }
          // Newest first
          list.innerHTML = [...entries].reverse().map(e =>
            `<div class="chat-entry">` +
              `<span class="chat-time">${e.time}</span>` +
              `<span class="chat-player">${e.player}</span>` +
              `<span class="chat-msg">${e.message}</span>` +
            `</div>`
          ).join('');
        })
        .catch(() => { /* backend offline */ });
    }

    setInterval(refreshChatLog, 2000);
    refreshChatLog();
  </script>
</body>
</html>
