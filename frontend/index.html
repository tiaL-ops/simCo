<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimCo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #222;
      font-family: Arial, sans-serif;
    }
    
    #game-container {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  
  <!-- Character Management UI -->
  <div id="character-ui" style="position: fixed; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; color: #fff; font-family: Arial, sans-serif;">
    <button id="add-character-btn" style="padding: 8px 16px; margin: 5px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">+ Add Character (Max 5)</button>
    <button id="game-state-btn" style="padding: 8px 16px; margin: 5px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold;">GAME: OFF</button>
    <div id="selected-character-display" style="margin-top: 10px; font-size: 12px; color: #3498db;">Selected: None</div>
    <div id="character-count" style="margin-top: 5px; font-size: 12px; color: #ecf0f1;">Characters: 0/5</div>
    <div id="prize-pool-display" style="margin-top: 10px; font-size: 14px; color: #f39c12; font-weight: bold;">Prize Pool: $1000.00</div>
    <div id="leaderboard-display" style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #555; font-size: 12px; color: #ecf0f1; min-width: 200px;">
      <strong>💰 Leaderboard</strong>
    </div>
  </div>
  
  <!-- Include Phaser library -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
  
  <!-- Include scene scripts -->
  <script src="phaser/scenes/MapScene.js"></script>
  <script src="phaser/scenes/AgentScene.js"></script>
  
  <!-- Include the game script -->
  <script src="game.js"></script>
</body>
</html>
