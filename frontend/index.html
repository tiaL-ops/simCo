<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimCo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #000000;
      font-family: 'Times New Roman', Times, serif;
      color: #ffffff;
    }
    
    #game-container {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000000;
    }

    #character-ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background-color: #000000;
      color: #ffffff;
      font-family: 'Times New Roman', Times, serif;
      font-size: 13px;
      line-height: 1.6;
    }

    .ui-section {
      margin-bottom: 20px;
    }

    .ui-section-title {
      color: #ffffff;
      font-weight: bold;
      margin-bottom: 8px;
      text-decoration: underline;
    }

    .ui-row {
      margin-bottom: 6px;
      color: #cccccc;
    }

    button {
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 6px 12px;
      margin: 4px 4px 4px 0;
      cursor: pointer;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
      font-weight: bold;
    }

    button:hover {
      background-color: #e0e0e0;
    }

    #leaderboard-display {
      padding: 10px 0;
      border-top: 1px solid #666666;
      margin-top: 12px;
    }

    .leaderboard-entry {
      margin: 3px 0;
      color: #cccccc;
    }

    .leaderboard-entry.selected {
      color: #ffffff;
      font-weight: bold;
    }

    #player-info-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1200;
      width: 260px;
      max-height: 70vh;
      overflow-y: auto;
      background: #000000;
      color: #ffffff;
      border: 1px solid #666666;
      padding: 10px;
      display: none;
      font-family: 'Times New Roman', Times, serif;
      font-size: 12px;
    }

    #player-info-panel.open {
      display: block;
    }

    .player-info-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      border-bottom: 1px solid #444444;
      padding-bottom: 6px;
    }

    .player-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #222222;
      color: #cccccc;
    }

    .player-info-row.selected {
      color: #ffffff;
      font-weight: bold;
    }

    .player-info-avatar {
      flex-shrink: 0;
      width: 32px;
      height: 64px;
      display: inline-block;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      background-color: transparent;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  
  <!-- Minimal Control Panel -->
  <div id="character-ui">
    <div class="ui-section">
      <button id="add-character-btn">Add Character</button>
      <button id="game-state-btn">Game: Off</button>
      <button id="see-player-info-btn">See Player Information</button>
    </div>

    <div class="ui-section">
      <div class="ui-section-title">Status</div>
      <div class="ui-row" id="selected-character-display">Selected: None</div>
      <div class="ui-row" id="character-count">Characters: 0/10</div>
    </div>

    <div class="ui-section">
      <div class="ui-section-title">Prize Pool</div>
      <div class="ui-row" id="prize-pool-display">$1000.00</div>
    </div>

    <div id="leaderboard-display">
      <div class="ui-section-title">Leaderboard</div>
    </div>
  </div>

  <div id="player-info-panel" aria-hidden="true">
    <div class="player-info-header">
      <div class="ui-section-title" style="margin-bottom:0; text-decoration:none;">Player Information</div>
      <button id="close-player-info-btn">Close</button>
    </div>
    <div id="player-info-list"></div>
  </div>
  
  <!-- Include Phaser library -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
  
  <!-- Include scene scripts -->
  <script src="phaser/scenes/MapScene.js"></script>
  <script src="phaser/scenes/AgentScene.js"></script>
  
  <!-- Include the game script -->
  <script src="game.js"></script>
</body>
</html>
